name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install python-Levenshtein  # Optional but recommended
    
    - name: Run import tests
      run: |
        python -c "from disambiguation_engine.engine import DisambiguationEngine; print('DisambiguationEngine OK')"
        python -c "from disambiguation_engine.author_merger import AuthorMerger; print('AuthorMerger OK')"
        python -c "from models.database import AuthorDatabase; print('Database OK')"
        python -c "from baselines import cluster_by_fini, cluster_by_aini; print('Baselines OK')"
        python -c "from utils.run_registry import RunRegistry; print('RunRegistry OK')"
